<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aaqibhafeez — profiles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #5a5a5a;
      --dim:     #3a3a3a;
      --tag-bg:  #1e1e1e;
      --hover-bg:#1a1a1a;
      --green:   #4ade80;
      --yellow:  #facc15;
    }
    [data-theme="light"] {
      --bg:      #f5f5f0;
      --surface: #eaeae5;
      --border:  #d0d0c8;
      --text:    #111111;
      --muted:   #888880;
      --dim:     #c0c0b8;
      --tag-bg:  #e8e8e0;
      --hover-bg:#e0e0d8;
      --green:   #16a34a;
      --yellow:  #ca8a04;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }
    .name span { color: var(--muted); font-weight: 400; }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.28rem 0.65rem;
      cursor: pointer;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .theme-btn:hover { color: var(--text); border-color: var(--dim); }

    .stats {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stats b { color: var(--text); font-weight: 500; }

    .controls {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .search-wrap { position: relative; }

    .search-prefix {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.75rem;
      pointer-events: none;
      user-select: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.55rem 0.7rem 0.55rem 2.4rem;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--dim); }
    #search::placeholder { color: var(--muted); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 0.68rem;
      padding: 0.22rem 0.6rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      border-radius: 2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--dim); }
    .filter-btn.active { color: var(--text); border-color: var(--text); }

    .list-header {
      display: grid;
      grid-template-columns: 1fr 80px 28px 28px;
      padding: 0.35rem 0.6rem;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.15rem;
    }

    .platform-row {
      display: grid;
      grid-template-columns: 1fr 80px 28px 28px;
      align-items: center;
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      animation: fadeIn 0.25s both;
    }
    .platform-row:hover { background: var(--hover-bg); }
    .platform-row.pinned-row { border-left: 2px solid var(--yellow); padding-left: calc(0.6rem - 2px); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row-main {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      min-width: 0;
    }

    .row-index {
      font-size: 0.65rem;
      color: var(--muted);
      width: 1.4rem;
      text-align: right;
      flex-shrink: 0;
    }

    .row-text { min-width: 0; }

    .row-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-desc {
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    .row-cat {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .act-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      font-family: inherit;
      font-size: 0.82rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: color 0.12s, background 0.12s;
      text-decoration: none;
      position: relative;
    }
    .act-btn:hover { color: var(--text); background: var(--border); }
    .act-btn.pin-active { color: var(--yellow); }
    .act-btn.copied { color: var(--green); }

    .act-btn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.62rem;
      padding: 0.18rem 0.45rem;
      border-radius: 2px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .act-btn:hover::after { opacity: 1; }

    .empty {
      padding: 2.5rem 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.68rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    @media (max-width: 540px) {
      .page { padding: 2rem 1rem 4rem; }
      .list-header,
      .platform-row { grid-template-columns: 1fr 28px 28px; }
      .row-cat { display: none; }
      .list-header .col-cat { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-top">
      <div>
        <div class="name">aaqibhafeez <span>/ profiles</span></div>
        <div class="tagline">all my coding, learning &amp; freelance accounts — one place</div>
      </div>
      <button class="theme-btn" id="themeBtn">[ light ]</button>
    </div>
    <div class="stats">
      <span>total <b id="statTotal">22</b></span>
      <span>showing <b id="statVisible">22</b></span>
      <span>pinned <b id="statPinned">0</b></span>
      <span>categories <b>5</b></span>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-prefix">/search</span>
      <input id="search" type="text" placeholder="platform, category, keyword…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="list-header">
    <div>platform</div>
    <div class="col-cat">category</div>
    <div></div>
    <div></div>
  </div>

  <div id="list"></div>

  <footer>
    <span>aaqibhafeez khan</span>
    <span id="clock"></span>
  </footer>
</div>

<script>
const platforms = [
  { name:"GitHub",          url:"https://github.com/AaqibhafeezKhan",                                           cat:"coding",    desc:"repos and contributions" },
  { name:"LeetCode",        url:"https://leetcode.com/u/Aaqibhafeez/",                                          cat:"coding",    desc:"dsa practice and contests" },
  { name:"FreeCodeCamp",    url:"https://www.freecodecamp.org/AaqibhafeezKhan",                                 cat:"learning",  desc:"web dev certifications" },
  { name:"HackerRank",      url:"https://www.hackerrank.com/profile/AaqibhafeezKhan",                           cat:"coding",    desc:"skill badges and certs" },
  { name:"Sololearn",       url:"https://www.sololearn.com/en/profile/32709822",                                cat:"learning",  desc:"interactive courses" },
  { name:"Forage",          url:"https://www.theforage.com/profile/rHHm2ASBs4XerTfmS",                         cat:"learning",  desc:"virtual work experience" },
  { name:"Kaggle",          url:"https://www.kaggle.com/aaqibhafeezkhan",                                       cat:"data",      desc:"notebooks and competitions" },
  { name:"Code Signal",     url:"https://learn.codesignal.com/profile/cm2k71ob60027if0hoh81z0jk",               cat:"coding",    desc:"assessments and benchmarks" },
  { name:"Maven Analytics", url:"https://mavenanalytics.io/profile/Aaqibhafeez-Khan/208786550",                cat:"data",      desc:"analytics portfolio" },
  { name:"Hacker Earth",    url:"https://www.hackerearth.com/@aaqibhafeezkhan/",                                cat:"coding",    desc:"hackathons and sprints" },
  { name:"Data Camp",       url:"https://www.datacamp.com/portfolio/aaqibhafeezkhan",                          cat:"data",      desc:"data science tracks" },
  { name:"CodeChef",        url:"https://www.codechef.com/users/aaqibhhkhan",                                   cat:"coding",    desc:"competitive contests" },
  { name:"CodeForces",      url:"https://www.codeforces.com/profile/AaqibhafeezKhan",                           cat:"coding",    desc:"algorithm rating" },
  { name:"Naukri 360",      url:"https://www.naukri.com/code360/profile/3ed37a85-deec-49c7-86cb-6b568873a187", cat:"coding",    desc:"code360 problems" },
  { name:"GeeksforGeeks",   url:"https://www.geeksforgeeks.org/user/aaqibhafeezkhan/",                          cat:"learning",  desc:"cs fundamentals streak" },
  { name:"Upwork",          url:"https://www.upwork.com/freelancers/~01cf658afd0a6ec8ae",                       cat:"freelance", desc:"freelance projects" },
  { name:"mulearn",         url:"https://app.mulearn.org/profile/aaqibhafeezkhan@mulearn",                      cat:"learning",  desc:"community karma" },
  { name:"Interviewbit",    url:"https://www.interviewbit.com/profile/aaqibhafeez-khan",                        cat:"coding",    desc:"interview prep" },
  { name:"Google Devs",     url:"https://g.dev/aaqibhafeez-khan",                                               cat:"learning",  desc:"badges and codelabs" },
  { name:"Microsoft Learn", url:"https://learn.microsoft.com/en-us/aaqibhafeezkhan-6989",                      cat:"learning",  desc:"certs and learning paths" },
  { name:"FutureLearn",     url:"https://www.futurelearn.com/profiles/22066310",                                cat:"learning",  desc:"university-backed courses" },
  { name:"Top Coder",       url:"https://profiles.topcoder.com/aaqibhafeezkhan",                                cat:"coding",    desc:"algorithm challenges" },
];

const categories = ["all", ...new Set(platforms.map(p => p.cat))];
let activeFilter = "all";
let query = "";
let pinned = JSON.parse(localStorage.getItem("ahk_pinned") || "[]");

const themeBtn = document.getElementById("themeBtn");
let isDark = true;
themeBtn.addEventListener("click", () => {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  themeBtn.textContent = isDark ? "[ light ]" : "[ dark ]";
});

function tick() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false });
}
tick(); setInterval(tick, 1000);

const filtersEl = document.getElementById("filters");
categories.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (cat === "all" ? " active" : "");
  btn.textContent = cat;
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = cat;
    render();
  });
  filtersEl.appendChild(btn);
});

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value.toLowerCase();
  render();
});

function copyURL(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.classList.add("copied");
    btn.setAttribute("data-tip", "copied!");
    setTimeout(() => { btn.classList.remove("copied"); btn.setAttribute("data-tip", "copy url"); }, 1600);
  });
}

function togglePin(name) {
  const i = pinned.indexOf(name);
  if (i === -1) pinned.push(name); else pinned.splice(i, 1);
  localStorage.setItem("ahk_pinned", JSON.stringify(pinned));
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = platforms.filter(p => {
    const matchCat = activeFilter === "all" || p.cat === activeFilter;
    const matchQ   = !query || p.name.toLowerCase().includes(query) ||
                     p.cat.includes(query) || p.desc.includes(query);
    return matchCat && matchQ;
  });

  filtered.sort((a, b) => (pinned.includes(a.name) ? 0 : 1) - (pinned.includes(b.name) ? 0 : 1));

  document.getElementById("statVisible").textContent = filtered.length;
  document.getElementById("statTotal").textContent   = platforms.length;
  document.getElementById("statPinned").textContent  = pinned.length;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">no results for "${query || activeFilter}"</div>`;
    return;
  }

  filtered.forEach((p, i) => {
    const isPinned = pinned.includes(p.name);
    const row = document.createElement("div");
    row.className = "platform-row" + (isPinned ? " pinned-row" : "");
    row.style.animationDelay = `${i * 0.02}s`;

    const main = document.createElement("div");
    main.className = "row-main";
    main.innerHTML = `
      <span class="row-index">${String(i + 1).padStart(2, "0")}</span>
      <div class="row-text">
        <div class="row-name">${p.name}</div>
        <div class="row-desc">${p.desc}</div>
      </div>`;

    const cat = document.createElement("div");
    cat.className = "row-cat";
    cat.textContent = p.cat;

    const pinBtn = document.createElement("button");
    pinBtn.className = "act-btn" + (isPinned ? " pin-active" : "");
    pinBtn.setAttribute("data-tip", isPinned ? "unpin" : "pin");
    pinBtn.textContent = isPinned ? "★" : "☆";
    pinBtn.addEventListener("click", () => togglePin(p.name));

    const visitBtn = document.createElement("a");
    visitBtn.className = "act-btn";
    visitBtn.setAttribute("data-tip", "open");
    visitBtn.href = p.url;
    visitBtn.target = "_blank";
    visitBtn.rel = "noopener";
    visitBtn.textContent = "↗";

    row.appendChild(main);
    row.appendChild(cat);
    row.appendChild(pinBtn);
    row.appendChild(visitBtn);
    list.appendChild(row);
  });
}

render();
</script>
</body>
</html>
